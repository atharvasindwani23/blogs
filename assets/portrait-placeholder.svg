<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2000" viewBox="0 0 1600 2000" role="img" aria-labelledby="title desc">
  <title id="title">Abstract portrait placeholder</title>
  <desc id="desc">A softly blurred monochrome head-and-shoulders silhouette.</desc>
  <defs>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#595754"/>
      <stop offset="0.46" stop-color="#292826"/>
      <stop offset="1" stop-color="#76726d"/>
    </linearGradient>
    <linearGradient id="shoulders" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#393735"/>
      <stop offset="1" stop-color="#85817c" stop-opacity="0.12"/>
    </linearGradient>
    <radialGradient id="light" cx="36%" cy="28%" r="65%">
      <stop offset="0" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="0.72" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="grain" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <mask id="fade">
      <rect width="1600" height="2000" fill="white"/>
      <rect y="1520" width="1600" height="480" fill="url(#bottomFade)"/>
    </mask>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="white"/>
      <stop offset="1" stop-color="black"/>
    </linearGradient>
  </defs>

  <g mask="url(#fade)" filter="url(#grain)">
    <path fill="url(#shoulders)" d="M147 2000c35-313 112-508 255-622 93-74 207-108 318-136h160c115 30 235 65 328 144 139 119 214 311 247 614H147Z"/>
    <path fill="#373532" d="M641 1160h321v300c-34 84-102 129-166 129-69 0-131-44-155-129v-300Z"/>
    <path fill="url(#skin)" d="M463 648c8-291 147-469 350-469 215 0 348 184 344 483-3 252-56 478-161 595-63 71-127 109-197 109-79 0-147-40-212-116-91-107-132-327-124-602Z"/>
    <path fill="#171716" d="M449 681c-29-226 21-412 158-507 106-74 267-87 389-15 132 78 190 245 163 455-52-117-112-187-194-223-106-46-208-31-310 18-85 41-144 122-206 272Z"/>
    <path fill="#22211f" d="M471 626c-31 73-39 180-11 270 22 72 54 119 91 156-20-123-17-234-3-338 14-101 57-183 114-260-87 26-153 84-191 172Z" opacity="0.82"/>
    <path fill="#11110f" d="M643 694c48-42 108-57 170-37-18 19-34 32-49 39-37 17-76 18-121-2Zm322-17c47-28 96-24 145 15-46 15-88 11-125-10l-20-5Z" opacity="0.68"/>
    <path fill="#171615" d="M791 719c-22 92-35 191-17 241 22 15 51 18 84 7-25-20-32-51-29-91 5-59 0-109-16-157h-22Z" opacity="0.5"/>
    <path fill="#191817" d="M688 1084c74 55 156 57 242 3-26 81-76 122-132 120-55-2-92-42-110-123Z" opacity="0.67"/>
    <path fill="url(#light)" d="M463 648c8-291 147-469 350-469 215 0 348 184 344 483-3 252-56 478-161 595-63 71-127 109-197 109-79 0-147-40-212-116-91-107-132-327-124-602Z"/>
  </g>

  <ellipse cx="800" cy="1020" rx="520" ry="760" fill="none" stroke="#77736e" stroke-opacity="0.07" stroke-width="4" filter="url(#soft)"/>
</svg>
